services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-tenant:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: tenant_db
    ports:
      - "5433:5432"
    volumes:
      - pg_tenant_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d tenant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-employee:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: employee_db
    ports:
      - "5434:5432"
    volumes:
      - pg_employee_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d employee_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: notifications_db
    ports:
      - "5435:5432"
    volumes:
      - pg_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d notifications_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-hiring:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: hiring_db
    ports:
      - "5436:5432"
    volumes:
      - pg_hiring_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d hiring_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-leave:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_leave_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_auth_data:
  pg_tenant_data:
  pg_employee_data:
  pg_notifications_data:
  pg_hiring_data:
  mongo_leave_data:
